<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <h2>🎯 AI JobLens</h2>
    <p class="subtitle">Your AI-powered resume match analyzer.</p>
    
    <label for="resumeInput">📋 Base Resume Text:</label>
    <textarea id="resumeInput" placeholder="Paste your clean resume text or markdown here..."></textarea>
    
    <button class="btn" id="analyzeBtn">⚡ Analyze Job Match</button>

    <div class="results hidden" id="resultsSection">
      <div class="score-container">
        <span class="score-label">Match Score:</span>
        <span class="score-value" id="matchScore">0%</span>
      </div>
      
      <div class="verdict-badge" id="roleBadge">AI/ML Role</div>

      <h3>❌ Missing Critical Skills:</h3>
      <div class="tag-container" id="missingSkills"></div>

      <h3>💡 Key Keyword Improvements:</h3>
      <ul class="rec-list" id="recommendations"></ul>
    </div>
    
    <div id="statusMessage" class="status-text"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
